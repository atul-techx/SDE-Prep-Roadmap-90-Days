{% extends 'roadmap/base.html' %}

{% block header_title %}Edit Day {{ day.day_number }} Content{% endblock %}

{% block content %}
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<div class="max-w-5xl mx-auto">
    <div class="mb-6 flex items-center justify-between">
        <div>
            <a href="{% url 'founder_content_list' %}" class="text-slate-500 hover:text-brand-blue font-semibold text-sm mb-2 inline-flex items-center gap-1"><i class="fa-solid fa-arrow-left"></i> Back to List</a>
            <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">Day {{ day.day_number }} Content</h1>
        </div>
    </div>

    <form method="POST" class="bg-white p-8 rounded-3xl shadow-sm border border-slate-200" id="contentForm">
        {% csrf_token %}
        
        <div class="mb-6">
            <label class="block text-slate-700 font-bold mb-2">Topic Name</label>
            <input type="text" name="topic_name" value="{{ day.topic_name }}" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-brand-blue/20 outline-none transition-all">
        </div>

        <div class="mb-6">
            <label class="block text-slate-700 font-bold mb-2">Rich Content (HTML/Text/Media)</label>
            <input type="hidden" name="rich_content" id="rich_content">
            <div id="editor-container" class="h-96 rounded-b-xl border-slate-200 font-sans text-base">
                {{ day.rich_content|safe }}
            </div>
        </div>
        
        <div class="flex justify-end pt-4 border-t border-slate-100">
            <button type="submit" class="bg-brand-blue hover:brightness-110 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-transform hover:-translate-y-0.5">
                Save Content
            </button>
        </div>
    </form>
</div>

<script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
<script>
    var quill = new Quill('#editor-container', {
        theme: 'snow',
        modules: {
            toolbar: [
                [{ 'header': [1, 2, 3, false] }],
                ['bold', 'italic', 'underline', 'strike'],
                ['blockquote', 'code-block'],
                [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                [{ 'script': 'sub'}, { 'script': 'super' }],
                [{ 'color': [] }, { 'background': [] }],
                ['link', 'image', 'video'],
                ['clean']
            ]
        }
    });

    var form = document.getElementById('contentForm');
    form.onsubmit = function() {
        var richContentInput = document.getElementById('rich_content');
        richContentInput.value = quill.root.innerHTML;
        return true;
    };
</script>
{% endblock %}
